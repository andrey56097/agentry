name: Build & Test

on:
  push:
    branches: [ main, develop, 'feature/**', 'task/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: agentry
          POSTGRES_USER: agentry
          POSTGRES_PASSWORD: agentry
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile
        run: ./gradlew compileJava compileTestJava --no-daemon

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          AGENTRY_DB_USER: agentry
          AGENTRY_DB_PASSWORD: agentry
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/agentry
          SPRING_LIQUIBASE_ENABLED: false
          SPRING_JPA_HIBERNATE_DDL_AUTO: update

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
          retention-days: 7
