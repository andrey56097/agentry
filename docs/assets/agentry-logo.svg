<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="40" fill="url(#bg)"/>
  <!-- Robot head -->
  <rect x="60" y="50" width="80" height="60" rx="10" fill="white" opacity="0.95"/>
  <!-- Eyes -->
  <circle cx="80" cy="75" r="8" fill="#6366f1"/>
  <circle cx="120" cy="75" r="8" fill="#6366f1"/>
  <!-- Antenna -->
  <line x1="100" y1="50" x2="100" y2="30" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <circle cx="100" cy="26" r="6" fill="#fbbf24"/>
  <!-- Body -->
  <rect x="70" y="115" width="60" height="35" rx="8" fill="white" opacity="0.85"/>
  <!-- Code brackets -->
  <text x="100" y="138" font-family="monospace" font-size="18" font-weight="bold" fill="#6366f1" text-anchor="middle">&lt;/&gt;</text>
</svg>
