spring:
  application:
    name: agentry

  datasource:
    url: jdbc:postgresql://localhost:5432/agentry
    username: ${AGENTRY_DB_USER:agentry}
    password: ${AGENTRY_DB_PASSWORD:agentry}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

server:
  port: 8080

agentry:
  llm:
    provider: ${AGENTRY_LLM_PROVIDER:ANTHROPIC}
    api-key: ${AGENTRY_LLM_API_KEY:}
    model: ${AGENTRY_LLM_MODEL:claude-sonnet-4-20250514}

logging:
  level:
    com.agentry: DEBUG
    org.springframework: WARN
